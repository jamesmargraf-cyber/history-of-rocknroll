<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Admin — Song Structure Lesson</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: #1a1a1a; background: #f5f4f0; height: 100vh; overflow: hidden; }

.header { background: #1a1a1a; color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 16px; font-weight: 500; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
.header-btns { display: flex; gap: 8px; align-items: center; }
.hbtn { padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
.hbtn-white { background: #fff; color: #1a1a1a; }
.hbtn-white:hover { background: #eee; }
.hbtn-blue { background: #2a5298; color: #fff; }
.hbtn-blue:hover { background: #1e3d72; }
.hbtn-red { background: #c8372d; color: #fff; }
.hbtn-red:hover { background: #a02820; }
.hbtn-green { background: #1D9E75; color: #fff; }
.hbtn-green:hover { background: #157a5a; }

.layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 58px); }

/* SIDEBAR */
.sidebar { background: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 10px 14px; border-bottom: 1px solid #eee; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #999; display: flex; align-items: center; justify-content: space-between; }
.add-song-btn { font-size: 11px; padding: 3px 10px; border: 1px solid #ddd; border-radius: 4px; background: #f5f5f5; cursor: pointer; color: #555; font-weight: 500; }
.add-song-btn:hover { background: #eee; color: #1a1a1a; }
.song-list { overflow-y: auto; flex: 1; }
.song-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: background 0.1s; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.song-item:hover { background: #f9f9f9; }
.song-item.active { background: #eff6ff; border-left: 3px solid #2a5298; padding-left: 11px; }
.song-item-info { flex: 1; min-width: 0; }
.song-item-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-item-meta { font-size: 11px; color: #888; margin-top: 2px; }
.song-item-form { font-size: 10px; color: #aaa; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.delete-btn { font-size: 11px; color: #ccc; cursor: pointer; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; }
.delete-btn:hover { color: #c8372d; background: #fff0f0; }

/* MAIN */
.main { overflow-y: auto; padding: 1.5rem; background: #f5f4f0; }

.empty-state { text-align: center; padding: 5rem 2rem; color: #aaa; }
.empty-state p { font-size: 16px; margin-bottom: 8px; }
.empty-state small { font-size: 13px; }

.editor-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; }

.editor-section { padding: 1.25rem; border-bottom: 1px solid #eee; }
.editor-section:last-child { border-bottom: none; }
.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #999; margin-bottom: 1rem; }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.field-row.full { grid-template-columns: 1fr; }
.field-row.three { grid-template-columns: 1fr 1fr 1fr; }

.field label { display: block; font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
.field input, .field select, .field textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; background: #fff; color: #1a1a1a; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #2a5298; }
.field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.other-input { margin-top: 6px; display: none; }
.other-input.visible { display: block; }

/* STRUCTURE BUILDER */
.structure-wrap { border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
.palette-row { padding: 10px 12px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.palette-label { font-size: 11px; color: #aaa; margin-right: 4px; }
.drag-chip { padding: 5px 12px; border-radius: 16px; font-size: 12px; font-weight: 600; cursor: grab; user-select: none; border: none; transition: transform 0.1s, opacity 0.1s; }
.drag-chip:active { cursor: grabbing; transform: scale(0.95); }
.drag-chip.dragging { opacity: 0.35; }
.custom-chip-btn { padding: 5px 10px; border-radius: 16px; font-size: 11px; cursor: pointer; border: 1px dashed #ccc; background: none; color: #888; }
.custom-chip-btn:hover { border-color: #999; color: #555; }

.timeline-area { padding: 12px; background: #fff; min-height: 80px; }
.timeline-label { font-size: 11px; color: #aaa; margin-bottom: 8px; }
.timeline-track { position: relative; height: 52px; background: #f9f9f9; border-radius: 6px; border: 1px solid #e0e0e0; overflow: hidden; }
.timeline-track.drag-over { border-color: #2a5298; border-style: dashed; background: #f0f5ff; }
.placed-block { position: absolute; top: 5px; height: 42px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; cursor: grab; user-select: none; }
.placed-block .rx { position: absolute; top: 2px; right: 3px; font-size: 9px; cursor: pointer; opacity: 0.5; line-height: 1; }
.placed-block .rx:hover { opacity: 1; }
.resize-handle { position: absolute; right: 0; top: 0; bottom: 0; width: 7px; cursor: ew-resize; }

.structure-readout { padding: 10px 12px; background: #fafafa; border-top: 1px solid #eee; font-size: 13px; min-height: 38px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.readout-chip { padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.readout-empty { color: #bbb; font-style: italic; font-size: 13px; }
.clear-btn { margin-left: auto; font-size: 11px; padding: 3px 10px; border: 1px solid #ddd; border-radius: 4px; background: none; cursor: pointer; color: #888; }
.clear-btn:hover { background: #f0f0f0; color: #555; }

.action-row { padding: 1rem 1.25rem; display: flex; gap: 10px; align-items: center; background: #fafafa; border-top: 1px solid #eee; }
.save-btn { padding: 9px 24px; background: #1a1a1a; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
.save-btn:hover { background: #333; }
.saved-badge { font-size: 11px; color: #1D9E75; font-weight: 500; opacity: 0; transition: opacity 0.3s; }
.saved-badge.show { opacity: 1; }

/* CUSTOM BLOCK MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 1.5rem; width: 320px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
.modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
.modal input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 1rem; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btns button { padding: 7px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; }
.modal-cancel { border: 1px solid #ddd; background: #fff; color: #555; }
.modal-cancel:hover { background: #f5f5f5; }
.modal-add { border: none; background: #1a1a1a; color: #fff; }
.modal-add:hover { background: #333; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Song Admin — Song Structure Lesson</h1>
    <p>Edit song structures, metadata, and notes · Export to update lesson</p>
  </div>
  <div class="header-btns">
    <button class="hbtn hbtn-red" onclick="resetToDefaults()">Reset defaults</button>
    <button class="hbtn hbtn-white" onclick="exportLesson()">Export lesson HTML</button>
    <button class="hbtn hbtn-blue" onclick="exportAdmin()">Export admin HTML</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      Songs
      <button class="add-song-btn" onclick="addNewSong()">+ Add song</button>
    </div>
    <div class="song-list" id="songList"></div>
  </div>
  <div class="main" id="mainPanel">
    <div class="empty-state">
      <p>Select a song from the sidebar</p>
      <small>Or click + Add song to create a new one</small>
    </div>
  </div>
</div>

<!-- Custom block modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Add custom section block</h3>
    <input type="text" id="customBlockInput" placeholder="e.g. Coda, Vamp, Tag..." maxlength="6">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-add" onclick="confirmCustomBlock()">Add to palette</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'rock_song_admin_songs';

const FORM_OPTIONS = [
  'Simple verse form',
  'Verse-chorus form',
  'Verse-chorus with bridge',
  '32-bar AABA',
  'Extended intro form',
  'Through-composed / suite',
  '12-bar blues form',
  'Delayed chorus form',
  'Other',
];

const DEFAULT_SONGS = [
  { title:"Johnny B. Goode", artist:"Chuck Berry", year:"1958", form:"12-bar blues form", structure:["In","V","Ch","V","Ch","Sol","V","Ch","Out"], notes:"Every verse follows the 12-bar blues cycle. 'Go Johnny Go' functions as a clear, repeated chorus. The guitar solo appears between the second chorus and final verse." },
  { title:"Like a Rolling Stone", artist:"Bob Dylan", year:"1965", form:"Verse-chorus form", structure:["In","V","Pre","Ch","V","Pre","Ch","V","Pre","Ch","V","Pre","Ch","Out"], notes:"The pre-chorus functions as a hybrid — it builds tension like a pre-chorus but carries unique lyrics each time, closer to a bridge. The song fades on a final chorus." },
  { title:"Baba O'Riley", artist:"The Who", year:"1971", form:"Extended intro form", structure:["In","V","Ch","V","Ch","Br","Out"], notes:"The synthesizer loop intro runs over a minute before any lyric enters. The outro features a long violin solo that accelerates in intensity." },
  { title:"Bohemian Rhapsody", artist:"Queen", year:"1975", form:"Through-composed / suite", structure:["A","B","C","D","E"], notes:"A genuine through-composed suite — no section repeats. Five distinct movements: a cappella intro, piano ballad, operatic section, hard rock, and reflective outro." },
  { title:"Don't Stop Believin'", artist:"Journey", year:"1981", form:"Delayed chorus form", structure:["In","V","Int","V","Pre","Int","V","Pre","Sol","Ch","Out"], notes:"No chorus until nearly four minutes in. Two interludes and two pre-choruses do all the tension-building work, making the eventual chorus one of rock's great payoffs." },
  { title:"Smells Like Teen Spirit", artist:"Nirvana", year:"1991", form:"Verse-chorus form", structure:["In","V","Pre","Ch","V","Pre","Ch","Sol","V","Pre","Ch","Out"], notes:"The loud-quiet-loud dynamic is structural, not just sonic. The pre-chorus exists specifically to make the chorus explode by contrast." },
  { title:"Yesterday", artist:"The Beatles", year:"1965", form:"32-bar AABA", structure:["In","A","A","B","A","B","A","Out"], notes:"A near-perfect specimen of Tin Pan Alley form with a brief intro and outro. The B section (bridge) shifts to minor-leaning harmony, providing emotional contrast." },
  { title:"Fade Into You", artist:"Mazzy Star", year:"1993", form:"Verse-chorus form", structure:["In","V","V","Ch","Sol","V","Ch","Out"], notes:"Minimal structure mirrors the lyrical theme of longing that goes nowhere. The solo provides the only significant departure before the final verse-chorus cycle." },
];

const PALETTE_BLOCKS = [
  { abbr:'In', bg:'#B5D4F4', text:'#0C447C' },
  { abbr:'V', bg:'#9FE1CB', text:'#085041' },
  { abbr:'Pre', bg:'#FAC775', text:'#633806' },
  { abbr:'Ch', bg:'#F4C0D1', text:'#72243E' },
  { abbr:'Br', bg:'#CECBF6', text:'#3C3489' },
  { abbr:'Sol', bg:'#F5C4B3', text:'#712B13' },
  { abbr:'Out', bg:'#D3D1C7', text:'#444441' },
  { abbr:'Tag', bg:'#C0DD97', text:'#27500A' },
  { abbr:'Int', bg:'#FDE68A', text:'#78350F' },
  { abbr:'A', bg:'#E9D5FF', text:'#4C1D95' },
  { abbr:'B', bg:'#BFDBFE', text:'#1E3A8A' },
  { abbr:'C', bg:'#BBF7D0', text:'#065F46' },
  { abbr:'D', bg:'#FED7AA', text:'#7C2D12' },
  { abbr:'E', bg:'#FECACA', text:'#7F1D1D' },
];

let customBlocks = [];
let SONGS = JSON.parse(JSON.stringify(DEFAULT_SONGS));
let activeSong = null;
let timeline = [];
let resizingBlock = null, resizeStartX = 0, resizeStartW = 0, trackWidth = 0;
let pendingCustomTarget = null;

// ── STORAGE ───────────────────────────────────────────────────────────────────
function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ songs: SONGS, custom: customBlocks })); } catch(e) {}
}

function loadPersisted() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const data = JSON.parse(saved);
    if (data.songs) SONGS = data.songs;
    if (data.custom) customBlocks = data.custom;
  } catch(e) {}
}

function resetToDefaults() {
  if (!confirm('Reset all songs to defaults? This cannot be undone.')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  location.reload();
}

// ── COLOR LOOKUP ──────────────────────────────────────────────────────────────
function getColor(abbr) {
  const all = [...PALETTE_BLOCKS, ...customBlocks];
  const found = all.find(b => b.abbr === abbr);
  return found ? { bg: found.bg, text: found.text } : { bg:'#e0e0e0', text:'#555' };
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('songList').innerHTML = SONGS.map((s, i) => `
    <div class="song-item ${activeSong === i ? 'active' : ''}" onclick="selectSong(${i})">
      <div class="song-item-info">
        <div class="song-item-title">${s.title}</div>
        <div class="song-item-meta">${s.artist} · ${s.year}</div>
        <div class="song-item-form">${s.form}</div>
      </div>
      <span class="delete-btn" onclick="deleteSong(event, ${i})" title="Delete song">✕</span>
    </div>`).join('');
}

function selectSong(i) {
  activeSong = i;
  timeline = SONGS[i].structure.map((abbr, idx) => ({
    abbr, left: idx / SONGS[i].structure.length,
    width: 0.9 / SONGS[i].structure.length,
    id: Date.now() + idx
  }));
  renderSidebar();
  renderEditor();
}

function addNewSong() {
  SONGS.push({ title:'New Song', artist:'', year:'', form:'Verse-chorus form', structure:[], notes:'' });
  activeSong = SONGS.length - 1;
  timeline = [];
  persist();
  renderSidebar();
  renderEditor();
}

function deleteSong(e, i) {
  e.stopPropagation();
  if (!confirm(`Delete "${SONGS[i].title}"?`)) return;
  SONGS.splice(i, 1);
  if (activeSong >= SONGS.length) activeSong = SONGS.length - 1;
  persist();
  renderSidebar();
  if (SONGS.length === 0) {
    activeSong = null;
    document.getElementById('mainPanel').innerHTML = '<div class="empty-state"><p>No songs yet</p><small>Click + Add song to get started</small></div>';
  } else {
    selectSong(activeSong);
  }
}

// ── EDITOR ────────────────────────────────────────────────────────────────────
function renderEditor() {
  const s = SONGS[activeSong];
  const formOpts = FORM_OPTIONS.map(f =>
    `<option value="${f}" ${s.form === f ? 'selected' : ''}>${f}</option>`
  ).join('');
  const isOther = !FORM_OPTIONS.slice(0,-1).includes(s.form);

  document.getElementById('mainPanel').innerHTML = `
    <div class="editor-card">

      <div class="editor-section">
        <div class="section-title">Song info</div>
        <div class="field-row">
          <div class="field">
            <label>Title</label>
            <input type="text" id="fTitle" value="${esc(s.title)}" placeholder="Song title">
          </div>
          <div class="field">
            <label>Artist</label>
            <input type="text" id="fArtist" value="${esc(s.artist)}" placeholder="Artist name">
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Year</label>
            <input type="text" id="fYear" value="${esc(s.year)}" placeholder="e.g. 1971" maxlength="4">
          </div>
          <div class="field">
            <label>Song form</label>
            <select id="fForm" onchange="handleFormChange()">
              ${formOpts}
            </select>
            <input type="text" id="fFormOther" class="other-input ${isOther ? 'visible' : ''}"
              value="${isOther ? esc(s.form) : ''}" placeholder="Describe the form...">
          </div>
        </div>
        <div class="field-row full">
          <div class="field">
            <label>Notes <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#bbb;">— shown in the song examples tab</span></label>
            <textarea id="fNotes" placeholder="Describe what makes this song's structure notable...">${esc(s.notes)}</textarea>
          </div>
        </div>
      </div>

      <div class="editor-section">
        <div class="section-title">Song structure</div>
        <div class="structure-wrap">
          <div class="palette-row">
            <span class="palette-label">Blocks:</span>
            ${[...PALETTE_BLOCKS, ...customBlocks].map(b =>
              `<span class="drag-chip" draggable="true" style="background:${b.bg};color:${b.text};"
                ondragstart="startChipDrag(event,'${b.abbr}')">${b.abbr}</span>`
            ).join('')}
            <button class="custom-chip-btn" onclick="openModal()">+ Custom</button>
          </div>
          <div class="timeline-area">
            <div class="timeline-label">Drag blocks onto the timeline to build the song structure</div>
            <div class="timeline-track" id="timelineTrack"></div>
          </div>
          <div class="structure-readout" id="structureReadout">
            <span class="readout-empty">Timeline is empty</span>
            <button class="clear-btn" onclick="clearTimeline()">Clear</button>
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="save-btn" onclick="saveSong()">Save song</button>
        <span class="saved-badge" id="savedBadge">✓ Saved</span>
      </div>

    </div>`;

  setupTrackDrop();
  renderTimeline();
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function handleFormChange() {
  const sel = document.getElementById('fForm');
  const other = document.getElementById('fFormOther');
  if (sel.value === 'Other') { other.classList.add('visible'); other.focus(); }
  else other.classList.remove('visible');
}

// ── TIMELINE ──────────────────────────────────────────────────────────────────
function startChipDrag(e, abbr) { e.dataTransfer.setData('text/plain', abbr); }

function setupTrackDrop() {
  const t = document.getElementById('timelineTrack');
  if (!t) return;
  t.addEventListener('dragover', e => { e.preventDefault(); t.classList.add('drag-over'); });
  t.addEventListener('dragleave', () => t.classList.remove('drag-over'));
  t.addEventListener('drop', e => {
    e.preventDefault(); t.classList.remove('drag-over');
    const abbr = e.dataTransfer.getData('text/plain');
    if (!abbr) return;
    const rect = t.getBoundingClientRect();
    const xPct = (e.clientX - rect.left) / rect.width;
    const w = Math.min(0.15, 1 / Math.max(timeline.length + 1, 1));
    const left = Math.min(Math.max(0, xPct - w/2), 1 - w);
    timeline.push({ abbr, left, width: w, id: Date.now() });
    renderTimeline();
  });
}

function renderTimeline() {
  const t = document.getElementById('timelineTrack');
  if (!t) return;
  t.querySelectorAll('.placed-block').forEach(b => b.remove());
  timeline.forEach(block => {
    const c = getColor(block.abbr);
    const el = document.createElement('div');
    el.className = 'placed-block';
    el.style.cssText = `left:${block.left*100}%;width:${block.width*100}%;background:${c.bg};color:${c.text};`;
    el.innerHTML = `${block.abbr}<span class="rx" onclick="removeBlock(${block.id})">✕</span><span class="resize-handle" onmousedown="startResize(event,${block.id})"></span>`;
    t.appendChild(el);
  });
  updateReadout();
}

function removeBlock(id) { timeline = timeline.filter(b => b.id !== id); renderTimeline(); }

function startResize(e, id) {
  e.preventDefault(); e.stopPropagation();
  const block = timeline.find(b => b.id === id); if (!block) return;
  resizingBlock = id; resizeStartX = e.clientX; resizeStartW = block.width;
  trackWidth = document.getElementById('timelineTrack').getBoundingClientRect().width;
  window.addEventListener('mousemove', doResize);
  window.addEventListener('mouseup', stopResize);
}
function doResize(e) {
  if (!resizingBlock) return;
  const block = timeline.find(b => b.id === resizingBlock); if (!block) return;
  block.width = Math.max(0.04, Math.min(1 - block.left, resizeStartW + (e.clientX - resizeStartX) / trackWidth));
  renderTimeline();
}
function stopResize() { resizingBlock = null; window.removeEventListener('mousemove', doResize); window.removeEventListener('mouseup', stopResize); }

function updateReadout() {
  const sorted = [...timeline].sort((a,b) => a.left - b.left);
  const el = document.getElementById('structureReadout');
  if (!el) return;
  if (sorted.length === 0) {
    el.innerHTML = '<span class="readout-empty">Timeline is empty</span><button class="clear-btn" onclick="clearTimeline()">Clear</button>';
    return;
  }
  el.innerHTML = sorted.map(b => {
    const c = getColor(b.abbr);
    return `<span class="readout-chip" style="background:${c.bg};color:${c.text};">${b.abbr}</span>`;
  }).join('') + '<button class="clear-btn" onclick="clearTimeline()">Clear</button>';
}

function clearTimeline() { timeline = []; renderTimeline(); }

// ── SAVE ──────────────────────────────────────────────────────────────────────
function saveSong() {
  const s = SONGS[activeSong];
  s.title = document.getElementById('fTitle').value.trim() || 'Untitled';
  s.artist = document.getElementById('fArtist').value.trim();
  s.year = document.getElementById('fYear').value.trim();
  const formSel = document.getElementById('fForm').value;
  s.form = formSel === 'Other'
    ? (document.getElementById('fFormOther').value.trim() || 'Other')
    : formSel;
  s.notes = document.getElementById('fNotes').value.trim();
  s.structure = [...timeline].sort((a,b) => a.left - b.left).map(b => b.abbr);
  persist();
  renderSidebar();
  const badge = document.getElementById('savedBadge');
  if (badge) { badge.classList.add('show'); setTimeout(() => badge.classList.remove('show'), 2000); }
}

// ── CUSTOM BLOCK MODAL ────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('customBlockInput').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('customBlockInput').focus(), 50);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function confirmCustomBlock() {
  const val = document.getElementById('customBlockInput').value.trim().slice(0, 6);
  if (!val) return;
  const exists = [...PALETTE_BLOCKS, ...customBlocks].find(b => b.abbr.toLowerCase() === val.toLowerCase());
  if (exists) { closeModal(); return; }
  // Assign a color from a rotation
  const colors = [
    { bg:'#A7F3D0', text:'#064E3B' }, { bg:'#FDE68A', text:'#92400E' },
    { bg:'#BFDBFE', text:'#1E3A8A' }, { bg:'#FBCFE8', text:'#831843' },
    { bg:'#DDD6FE', text:'#4C1D95' }, { bg:'#FCA5A5', text:'#7F1D1D' },
  ];
  const c = colors[customBlocks.length % colors.length];
  customBlocks.push({ abbr: val, bg: c.bg, text: c.text });
  persist();
  closeModal();
  renderEditor();
}

document.getElementById('customBlockInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmCustomBlock();
  if (e.key === 'Escape') closeModal();
});

// ── EXPORT ────────────────────────────────────────────────────────────────────
function downloadFile(html, filename) {
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function exportLesson() { downloadFile(buildLessonHTML(), 'song_structure_lesson.html'); }
function exportAdmin() { downloadFile(buildAdminHTML(), 'song_admin.html'); }

function buildAdminHTML() {
  const songsJS = JSON.stringify(SONGS, null, 2);
  const customJS = JSON.stringify(customBlocks, null, 2);
  const src = document.documentElement.outerHTML;
  // Replace the DEFAULT_SONGS and customBlocks defaults
  return src
    .replace(/const DEFAULT_SONGS = \[[\s\S]*?\];/, `const DEFAULT_SONGS = ${songsJS};`)
    .replace(/let customBlocks = \[\];/, `let customBlocks = ${customJS};`);
}

function buildLessonHTML() {
  // Read the existing lesson file structure — we output a data block
  // that can be pasted into song_structure_lesson.html
  // Since we can't read files, we output a minimal standalone songs-only snippet
  // wrapped in a comment for easy identification
  const songsJS = SONGS.map(s => {
    const structStr = JSON.stringify(s.structure);
    return `  { title:${JSON.stringify(s.title)}, artist:${JSON.stringify(s.artist)}, year:${JSON.stringify(s.year)}, form:${JSON.stringify(s.form)}, structure:${structStr}, notes:${JSON.stringify(s.notes)} }`;
  }).join(',\n');

  return `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Song Data Export</title>
<style>body{font-family:monospace;padding:2rem;background:#f5f4f0;} pre{background:#fff;border:1px solid #ddd;border-radius:8px;padding:1.5rem;overflow:auto;font-size:13px;line-height:1.6;} h2{margin-bottom:1rem;font-size:16px;} p{margin-bottom:1rem;font-size:13px;color:#666;}</style>
</head><body>
<h2>Song Data Export — History of Rock 'n' Roll</h2>
<p>Copy the SONGS array below and paste it into <strong>song_structure_lesson.html</strong> to replace the existing SONGS constant.</p>
<pre>const SONGS = [
${songsJS}
];</pre>
</body></html>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadPersisted();
renderSidebar();
</script>
